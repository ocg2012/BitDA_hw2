<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAT.co 財務指標分析儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    
    <nav class="bg-slate-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    <span class="font-bold text-xl tracking-wider">DAT.co Analytics</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">DAT.co 財務指標分析儀表板</h1>
            <p class="text-slate-500 max-w-3xl">
                此儀表板同步串接 Binance 與 Finnhub API，自動抓取最新<strong>發行股數</strong>與<strong>歷史價格</strong>，計算精確的資產淨值折溢價。
            </p>
        </header>

        <!-- 數據卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <div class="text-sm font-medium text-slate-500 mb-1">最新 BTC 價格 (USD)</div>
                <div id="btcPriceCard" class="text-3xl font-bold text-slate-800">載入中...</div>
                <div class="text-xs text-slate-400 mt-2">資料來源: Binance API</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <div id="stockCardTitle" class="text-sm font-medium text-slate-500 mb-1">真實 MSTR 股價 (USD)</div>
                <div id="stockPriceCard" class="text-3xl font-bold text-slate-800">載入中...</div>
                <div class="text-xs text-slate-400 mt-2">資料來源: Finnhub API</div>
            </div>
            <div class="bg-blue-50 rounded-xl shadow-sm border border-blue-100 p-6 relative overflow-hidden">
                <div class="text-sm font-medium text-blue-600 mb-1">當前 Premium to NAV</div>
                <div id="premiumCard" class="text-4xl font-black text-blue-700">載入中...</div>
                <div id="dynamicSharesText" class="text-xs text-blue-500 mt-2">正在同步最新股數數據...</div>
            </div>
        </div>

        <!-- 圖表區 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-4 space-y-3 lg:space-y-0">
                <h2 class="text-lg font-semibold text-slate-800">指標時間序列趨勢圖</h2>
                
                <div class="flex flex-wrap items-center gap-3">
                    <select id="companySelect" onchange="switchCompany(this.value)" class="bg-slate-800 border border-slate-700 text-white py-1.5 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium transition-colors cursor-pointer">
                        <option value="MSTR">MicroStrategy (MSTR)</option>
                        <option value="MARA">Marathon Digital (MARA)</option>
                        <option value="RIOT">Riot Platforms (RIOT)</option>
                    </select>

                    <label class="flex items-center space-x-2 cursor-pointer bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition">
                        <input type="checkbox" id="compareBtcToggle" onchange="toggleBtcCompare()" class="rounded text-blue-600 focus:ring-blue-500 w-4 h-4">
                        <span class="text-sm font-medium text-slate-700">對比 BTC 走勢</span>
                    </label>

                    <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                        <button id="btn-7d" onclick="changeDays(7)" class="px-3 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 transition">7 天</button>
                        <button id="btn-30d" onclick="changeDays(30)" class="px-3 py-1 text-xs font-medium rounded-md bg-white text-blue-600 shadow-sm transition">30 天</button>
                        <button id="btn-90d" onclick="changeDays(90)" class="px-3 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800 transition">90 天</button>
                    </div>

                    <select id="indicatorSelect" onchange="switchIndicator(this.value)" class="bg-slate-50 border border-slate-300 text-slate-700 py-1.5 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium transition-colors cursor-pointer">
                        <option value="premium">Premium to NAV (%)</option>
                        <option value="discount">Discount to NAV (%)</option>
                        <option value="mnav">mNAV (十億 USD)</option>
                        <option value="stock">真實股價 (USD)</option>
                    </select>
                </div>
            </div>
            
            <div class="relative h-80 w-full">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <!-- AI 分析 -->
        <div class="bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6 text-white">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-2">
                    <span class="bg-blue-500 p-1.5 rounded-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </span>
                    <h2 class="text-xl font-semibold">Gemini AI 數據透視</h2>
                </div>
                <button onclick="generateSummary()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-md flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    分析當前指標
                </button>
            </div>
            <div id="aiSummaryContent" class="prose prose-invert max-w-none text-slate-300 text-sm leading-relaxed p-4 bg-slate-800 rounded-lg border border-slate-700 min-h-[100px]">
                點擊按鈕，AI 將根據即時動態股數與市場價格進行解讀...
            </div>
            <div id="aiErrorMsg" class="hidden mt-3 text-red-400 text-sm bg-red-900/30 p-3 rounded-lg border border-red-800"></div>
        </div>
    </main>

    <script>
        let chartInstance = null;
        
        // 初始配置 (做為 fallback，動態抓取失敗時使用)
        const companyProfiles = {
            'MSTR': { btcHoldings: 252220, shares: 202000000, name: 'MicroStrategy' },
            'MARA': { btcHoldings: 26842, shares: 280000000, name: 'Marathon Digital' },
            'RIOT': { btcHoldings: 9084, shares: 230000000, name: 'Riot Platforms' }
        };
        
        let currentCompany = 'MSTR';
        let rawBtcKlines = []; 
        let masterData = { dates: [], btcPrices: [], stockPrices: [], premiums: [], discounts: [], mnavs: [] }; 
        let currentDisplayData = {}; 
        let currentIndicator = 'premium'; 
        let currentDays = 30; 
        let showBtcCompare = false; 

        window.onload = fetchFinancialData;

        async function fetchFinancialData() {
            try {
                // 1. 抓取 Binance BTC 價格
                const btcRes = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=90');
                if (!btcRes.ok) throw new Error('無法獲取比特幣價格資料');
                rawBtcKlines = await btcRes.json();

                const fromTime = Math.floor(rawBtcKlines[0][0] / 1000) - (86400 * 5); 
                const toTime = Math.floor(Date.now() / 1000);

                // 2. 🚀 動態抓取股價與企業指標 (包含 Shares Outstanding)
                const stockRes = await fetch('/api/getStockData', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: currentCompany, from: fromTime, to: toTime })
                });
                
                if (!stockRes.ok) throw new Error(`API 請求失敗: ${stockRes.status}`);
                const stockData = await stockRes.json();

                // 3. 更新動態股數 (若 API 有回傳 metric)
                if (stockData.metric && stockData.metric.shareOutstanding) {
                    const dynamicShares = stockData.metric.shareOutstanding * 1000000; // Finnhub 通常以百萬為單位
                    companyProfiles[currentCompany].shares = dynamicShares;
                    document.getElementById('dynamicSharesText').innerText = `已同步最新股數: ${(dynamicShares/1000000).toFixed(2)}M`;
                } else {
                    document.getElementById('dynamicSharesText').innerText = `使用預設股數: ${(companyProfiles[currentCompany].shares/1000000).toFixed(2)}M`;
                }

                processCompanyData(stockData);

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('premiumCard').innerText = "數據錯誤";
                document.getElementById('aiErrorMsg').innerText = "無法從 API 獲取動態數據，請檢查後端配置。";
                document.getElementById('aiErrorMsg').classList.remove('hidden');
            }
        }

        function processCompanyData(stockData) {
            const dates = [], btcPrices = [], premiums = [], discounts = [], stockPrices = [], mnavs = [];
            const profile = companyProfiles[currentCompany];

            const stockMap = {};
            if (stockData && stockData.s === "ok") {
                for (let i = 0; i < stockData.t.length; i++) {
                    const dateStr = new Date(stockData.t[i] * 1000).toLocaleDateString('zh-TW');
                    stockMap[dateStr] = stockData.c[i];
                }
            }

            let lastKnownStockPrice = (stockData.c && stockData.c.length > 0) ? stockData.c[stockData.c.length - 1] : 0;

            rawBtcKlines.forEach(kline => {
                const dateObj = new Date(kline[0]);
                const dateDisplay = dateObj.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
                const dateKey = dateObj.toLocaleDateString('zh-TW');
                const btcClosePrice = parseFloat(kline[4]);

                dates.push(dateDisplay);
                btcPrices.push(btcClosePrice);

                // mNAV
                const mnavBillion = (btcClosePrice * profile.btcHoldings) / 1000000000;
                mnavs.push(mnavBillion.toFixed(2));

                const dayStockPrice = stockMap[dateKey] || lastKnownStockPrice;
                stockPrices.push(dayStockPrice.toFixed(2));

                // 核心計算 (使用 profile.shares 是動態抓取後的數值)
                const navPerShare = (btcClosePrice * profile.btcHoldings) / profile.shares;
                const premium = (dayStockPrice / navPerShare) - 1;
                premiums.push((premium * 100).toFixed(2));
                discounts.push(((1 - (dayStockPrice / navPerShare)) * 100).toFixed(2));
            });

            masterData = { dates, btcPrices, stockPrices, premiums, discounts, mnavs };
            updateStatCards();
            applyFiltersAndRender();
        }

        function updateStatCards() {
            const idx = masterData.dates.length - 1;
            if (idx < 0) return;
            document.getElementById('btcPriceCard').innerText = `$${masterData.btcPrices[idx].toLocaleString()}`;
            document.getElementById('stockPriceCard').innerText = `$${parseFloat(masterData.stockPrices[idx]).toFixed(2)}`;
            document.getElementById('premiumCard').innerText = `${masterData.premiums[idx]}%`;
        }

        function switchCompany(key) {
            currentCompany = key;
            document.getElementById('stockCardTitle').innerText = `真實 ${key} 股價 (USD)`;
            fetchFinancialData();
        }

        function switchIndicator(type) {
            currentIndicator = type;
            applyFiltersAndRender();
        }

        function changeDays(d) {
            currentDays = d;
            [7, 30, 90].forEach(val => {
                document.getElementById(`btn-${val}d`).className = val === d 
                    ? "px-3 py-1 text-xs font-medium rounded-md bg-white text-blue-600 shadow-sm"
                    : "px-3 py-1 text-xs font-medium rounded-md text-slate-500 hover:text-slate-800";
            });
            applyFiltersAndRender();
        }

        function toggleBtcCompare() {
            showBtcCompare = document.getElementById('compareBtcToggle').checked;
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            if (!masterData.dates.length) return;
            currentDisplayData = {
                dates: masterData.dates.slice(-currentDays),
                btcPrices: masterData.btcPrices.slice(-currentDays),
                stockPrices: masterData.stockPrices.slice(-currentDays),
                premiums: masterData.premiums.slice(-currentDays),
                discounts: masterData.discounts.slice(-currentDays),
                mnavs: masterData.mnavs.slice(-currentDays)
            };

            let data, label, unit, color;
            switch(currentIndicator) {
                case 'premium': data = currentDisplayData.premiums; label = 'Premium to NAV'; unit = '%'; color = [59, 130, 246]; break;
                case 'discount': data = currentDisplayData.discounts; label = 'Discount to NAV'; unit = '%'; color = [239, 68, 68]; break;
                case 'mnav': data = currentDisplayData.mnavs; label = 'mNAV'; unit = 'B'; color = [16, 185, 129]; break;
                case 'stock': data = currentDisplayData.stockPrices; label = '真實股價'; unit = '$'; color = [139, 92, 246]; break;
            }
            renderChart(currentDisplayData.dates, data, label, unit, color, currentDisplayData.btcPrices);
        }

        function renderChart(labels, mainData, labelName, unit, rgb, btc) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            const grad = ctx.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.2)`);
            grad.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: labelName, data: mainData, borderColor: `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`, backgroundColor: grad, fill: true, tension: 0.4, yAxisID: 'y', pointRadius: 0 },
                        ...(showBtcCompare ? [{ label: 'BTC Price', data: btc, borderColor: '#f59e0b', borderDash: [5,5], tension: 0.4, yAxisID: 'y1', pointRadius: 0 }] : [])
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { position: 'left', ticks: { callback: v => (unit==='$'?'$':'') + v + (unit==='%'?'%':'') } },
                        y1: { display: showBtcCompare, position: 'right', grid: { display: false } }
                    }
                }
            });
        }

        async function generateSummary() {
            const content = document.getElementById('aiSummaryContent');
            content.innerHTML = "正在計算動態數據並產出分析報告...";
            try {
                const indicator = currentIndicator === 'premium' ? "溢價" : currentIndicator === 'discount' ? "折價" : "資產規模";
                const latest = masterData[currentIndicator + 's'] ? masterData[currentIndicator + 's'].slice(-1)[0] : masterData.stockPrices.slice(-1)[0];
                const shares = (companyProfiles[currentCompany].shares / 1000000).toFixed(2);
                
                const prompt = `分析 ${currentCompany}。目前動態股數為 ${shares}M。當前 ${indicator} 為 ${latest}。比特幣價格為 $${masterData.btcPrices.slice(-1)[0]}。請針對溢價率與市場信心給出 150 字繁體中文分析。`;

                const res = await fetch('/api/generateSummary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const result = await res.json();
                content.innerHTML = result.candidates[0].content.parts[0].text;
            } catch (e) {
                content.innerHTML = "分析失敗。";
            }
        }
    </script>
</body>
</html>
